<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Foto com Moldura - Kátia Menezes</title>
  <link rel="preload" as="image" href="assets/moldura-katia-v3.png?v=4" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <main class="app">
    <section id="cameraScreen" class="screen active">
      <div class="stage">
        <video id="video" autoplay playsinline muted></video>

        <img
          id="overlayFrame"
          src="assets/moldura-katia-v3.png?v=4"
          alt="Moldura de girassóis"
        />

        <div class="textOverlay" aria-hidden="true">
          <p class="phrase">Celebrando a plenitude da vida com o coração cheio de alegria.</p>
          <h1>Kátia Menezes</h1>
          <p class="date">20/6/2026</p>
        </div>

        <button id="switchCameraBtn" class="topButton" type="button">🔄 Câmera</button>

        <div class="cameraControls">
          <button id="captureBtn" class="captureButton" type="button" aria-label="Capturar foto">
            📸
          </button>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="resultWrap">
        <img id="resultImage" alt="Foto capturada com moldura" />
      </div>

      <div class="resultActions">
        <button id="newPhotoBtn" type="button">Nova foto</button>
        <a id="downloadLink" download="foto-katia-menezes.png">Baixar foto</a>
        <button id="shareBtn" type="button">Compartilhar</button>
      </div>
    </section>
  </main>

  <script src="script.js?v=4"></script>
</body>
</html>
