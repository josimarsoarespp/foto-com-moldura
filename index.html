<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Foto com Moldura - Kátia Menezes</title>
  <link rel="stylesheet" href="style.css?v=katia2" />
</head>
<body>
  <main class="app">
    <section id="cameraScreen" class="screen active">
      <div class="stage" id="stage">
        <video id="video" autoplay playsinline muted></video>
        <img class="molduraPreview" src="assets/moldura.png?v=katia2" alt="" aria-hidden="true" />

        <div class="textOverlay" aria-hidden="true">
          <div class="messageText">Celebrando a plenitude da vida<br>com o coração cheio de alegria.</div>
          <div class="nameText">Kátia Menezes</div>
          <div class="dateText">20/6/2026</div>
        </div>
      </div>

      <div class="controls cameraControls">
        <button id="switchCameraBtn" class="secondary">🔄 Trocar câmera</button>
        <button id="captureBtn" class="primary">📸 Capturar</button>
      </div>
      <p class="tip">Ao abrir, permita o acesso à câmera. Funciona melhor pelo link HTTPS do GitHub Pages.</p>
    </section>

    <section id="resultScreen" class="screen">
      <h1>Sua foto ficou pronta 🎉</h1>
      <img id="resultImage" alt="Foto com moldura" />
      <div class="controls resultControls">
        <button id="newPhotoBtn" class="secondary">Tirar outra</button>
        <a id="downloadLink" class="primary" download="foto-katia-menezes.png">Baixar foto</a>
        <button id="shareBtn" class="secondary">Compartilhar</button>
      </div>
    </section>
  </main>

  <script src="script.js?v=katia2"></script>
</body>
</html>
