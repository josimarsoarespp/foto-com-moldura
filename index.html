<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Foto com Moldura</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="cameraScreen" class="screen active">
      <div class="stage" id="stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="previewCanvas" class="hidden"></canvas>

        <div class="frameOverlay" aria-hidden="true">
          <div class="topText" id="topText">KYARA • 15 ANOS</div>
          <div class="corner cornerTopLeft"></div>
          <div class="corner cornerTopRight"></div>
          <div class="sparkles">✦ ✧ ✦</div>
          <div class="bottomText" id="bottomText">Uma noite inesquecível</div>
        </div>
      </div>

      <div class="controls">
        <button id="switchCameraBtn" class="secondary">Trocar câmera</button>
        <button id="captureBtn" class="primary">📸 Capturar</button>
      </div>
      <p class="tip">Ao abrir, permita o acesso à câmera. Funciona melhor pelo link HTTPS do GitHub Pages.</p>
    </section>

    <section id="resultScreen" class="screen">
      <h1>Sua foto ficou pronta 🎉</h1>
      <img id="resultImage" alt="Foto com moldura" />
      <div class="controls resultControls">
        <button id="newPhotoBtn" class="secondary">Tirar outra</button>
        <a id="downloadLink" class="primary" download="foto-com-moldura.png">Baixar foto</a>
        <button id="shareBtn" class="secondary">Compartilhar</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
